name: Generate and commit package-lock

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci --no-audit --prefer-offline || npm install --no-audit --prefer-offline

      - name: Show lock status
        run: |
          echo "Files in repo:" && ls -la
          echo "----"
          git status --porcelain || true

      - name: Commit package-lock.json if changed
        run: |
          if git status --porcelain | grep -q '^M\|^A' ; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package-lock.json || true
            git commit -m "chore: add/update package-lock.json (generated by CI)" || echo "No changes to commit"
            git push origin HEAD:main || echo "Push failed"
          else
            echo "No lockfile changes detected"
          fi
